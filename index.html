// doSearch関数の中の、filtered.forEachの部分を以下に書き換え
filtered.forEach(s => {
    res.innerHTML += `
        <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fafafa;">
            <!-- aタグに display: block をつけて、広い範囲をタップ可能にする -->
            <a href="${s.url}" target="_blank" style="display: block; color: #1a0dab; text-decoration: none; font-size: 20px; font-weight: bold;">
                ${s.name}
                <span style="color: #006621; font-size: 14px; display: block; font-weight: normal; margin-top: 5px;">
                    ${s.url}
                </span>
            </a>
        </div>`;
});
